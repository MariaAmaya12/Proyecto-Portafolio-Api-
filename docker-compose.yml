services:
  backend:
    build: .
    container_name: risklab_backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///./data/risklab.db
      APP_ENV: development
      LOG_LEVEL: INFO
    volumes:
      - ./data:/app/data

  frontend:
    build: .
    container_name: risklab_frontend
    command: streamlit run app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://backend:8000
      BACKEND_API_BASE_URL: http://backend:8000
      APP_ENV: development
      LOG_LEVEL: INFO
    depends_on:
      - backend
